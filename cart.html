



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-gray-100">

  <h1 class="text-2xl font-bold mb-6">Your Cart</h1>

  <div id="cart-items" class="space-y-4"></div>

  <h2 class="mt-6 font-bold text-lg">
    Total: $<span id="total">0</span>
  </h2>

  <button onclick="clearCart()" class="mt-6 bg-red-500 text-white px-4 py-2 rounded">
    Clear Cart
  </button>

  <script>
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById("cart-items");
    const totalDisplay = document.getElementById("total");

    let total = 0;

    if (cart.length === 0) {
      container.innerHTML = "<p>Your cart is empty</p>";
    }

    cart.forEach((item, index) => {
      total += Number(item.price);

      const div = document.createElement("div");
      div.className = "p-4 bg-white rounded shadow flex justify-between items-center";

      div.innerHTML = `
        <span>${item.name} - $${item.price}</span>
        <button onclick="removeItem(${index})" class="text-red-500">Remove</button>
      `;

      container.appendChild(div);
    });

    totalDisplay.textContent = total;

    function clearCart() {
      localStorage.removeItem("cart");
      location.reload();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      location.reload();
    }
  </script>

</body>
</html>
